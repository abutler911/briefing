<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Tab</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@200;300;400&family=JetBrains+Mono:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: #16161c;
        --surface: rgba(255, 255, 255, 0.04);
        --surface-hover: rgba(255, 255, 255, 0.08);
        --text: #f2efea;
        --text-dim: rgba(240, 236, 231, 0.62);
        --text-mid: rgba(240, 236, 231, 0.82);
        --crimson: #c23c3c;
        --amber: #d4a54a;
        --border: rgba(255, 255, 255, 0.06);
      }

      body {
        font-family: "JetBrains Mono", monospace;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        user-select: none;
      }

      /* Background image layer */
      .bg-image {
        position: fixed;
        inset: 0;
        background-size: cover;
        background-position: center;
        opacity: 0;
        filter: brightness(1.12) saturate(1.05);
        transition: opacity 1.5s ease;
        z-index: 0;
      }
      .bg-image.loaded {
        opacity: 1;
      }

      .bg-overlay {
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            ellipse at center,
            rgba(10, 10, 12, 0.08) 0%,
            rgba(10, 10, 12, 0.42) 85%
          ),
          linear-gradient(
            to bottom,
            rgba(10, 10, 12, 0.38) 0%,
            rgba(10, 10, 12, 0.06) 42%,
            rgba(10, 10, 12, 0.42) 100%
          );
        z-index: 1;
      }

      .content {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        width: 100%;
        max-width: 640px;
        padding: 0 2rem;
      }

      /* Top bar */
      .top-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 10;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 1.5rem 2rem;
        font-size: 0.85rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-mid);
        text-shadow:
          0 1px 3px rgba(0, 0, 0, 0.7),
          0 1px 16px rgba(0, 0, 0, 0.5);
      }

      .date-display {
        color: var(--text);
      }
      .weather-display {
        text-align: right;
        cursor: pointer;
        transition: color 0.3s;
        color: var(--text);
      }
      .weather-display:hover {
        color: var(--text);
      }
      .weather-temp {
        font-size: 1.8rem;
        font-family: "Cormorant Garamond", serif;
        font-weight: 300;
        letter-spacing: 0;
        text-transform: none;
        color: var(--text);
      }
      .weather-desc {
        margin-top: 2px;
      }
      .weather-extra {
        margin-top: 2px;
        font-size: 0.62rem;
        letter-spacing: 0.06em;
        color: var(--text-mid);
        opacity: 0.85;
      }
      .weather-icon {
        font-family: "JetBrains Mono", monospace;
        margin-right: 0.25em;
      }

      /* Clock */
      .clock {
        font-family: "Inter", system-ui, -apple-system, sans-serif;
        font-weight: 200;
        font-size: clamp(5rem, 14vw, 10rem);
        line-height: 1;
        letter-spacing: -0.03em;
        color: var(--text);
        margin-bottom: 0.2em;
        text-shadow:
          0 2px 4px rgba(0, 0, 0, 0.55),
          0 2px 30px rgba(0, 0, 0, 0.5);
      }
      .clock-ampm {
        font-size: 0.28em;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-mid);
        margin-left: 0.2em;
        vertical-align: 0.35em;
      }

      /* Greeting */
      .greeting {
        font-family: "Cormorant Garamond", serif;
        font-weight: 400;
        font-size: clamp(2.2rem, 6vw, 4rem);
        line-height: 1.05;
        letter-spacing: 0.01em;
        color: var(--text);
        margin-bottom: 0.6rem;
        text-align: center;
        text-shadow:
          0 2px 4px rgba(0, 0, 0, 0.6),
          0 2px 24px rgba(0, 0, 0, 0.5);
      }

      /* Mantra */
      .mantra {
        font-family: "Cormorant Garamond", serif;
        font-weight: 300;
        font-style: italic;
        font-size: clamp(1.2rem, 3vw, 1.8rem);
        color: var(--text-mid);
        letter-spacing: 0.04em;
        text-align: center;
        margin-bottom: 3rem;
        text-shadow:
          0 1px 3px rgba(0, 0, 0, 0.65),
          0 2px 18px rgba(0, 0, 0, 0.45);
      }

      /* Todo section */
      .todo-section {
        width: 100%;
        max-width: 380px;
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(18px) saturate(130%);
        -webkit-backdrop-filter: blur(18px) saturate(130%);
        border-radius: 10px;
        padding: 1.2rem 1.4rem;
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      }

      .todo-label {
        font-size: 0.6rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--text-dim);
        margin-bottom: 0.6rem;
        text-align: center;
      }

      .todo-list {
        list-style: none;
      }
      .todo-item {
        display: flex;
        align-items: center;
        gap: 0.7rem;
        padding: 0.5rem 0;
        border-bottom: 1px solid var(--border);
        font-size: 0.85rem;
        font-weight: 300;
        color: var(--text-mid);
        transition: color 0.3s;
      }
      .todo-item:hover {
        color: var(--text);
      }

      .todo-check {
        width: 14px;
        height: 14px;
        border: 1px solid var(--text-dim);
        border-radius: 2px;
        cursor: pointer;
        flex-shrink: 0;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .todo-check:hover {
        border-color: var(--crimson);
      }
      .todo-check.done {
        border-color: var(--crimson);
        background: var(--crimson);
      }
      .todo-check.done::after {
        content: "✓";
        color: var(--bg);
        font-size: 10px;
      }
      .todo-item.done .todo-text {
        text-decoration: line-through;
        color: var(--text-dim);
        opacity: 0.5;
      }

      .todo-text {
        flex: 1;
        background: none;
        border: none;
        color: inherit;
        font: inherit;
        outline: none;
      }

      .todo-delete {
        opacity: 0;
        background: none;
        border: none;
        color: var(--text-dim);
        cursor: pointer;
        font-size: 1rem;
        padding: 0 0.2rem;
        transition:
          opacity 0.2s,
          color 0.2s;
      }
      .todo-item:hover .todo-delete {
        opacity: 1;
      }
      .todo-delete:hover {
        color: var(--crimson);
      }

      .todo-add {
        width: 100%;
        background: none;
        border: none;
        border-bottom: 1px solid var(--border);
        color: var(--text-dim);
        font:
          300 0.85rem "JetBrains Mono",
          monospace;
        padding: 0.6rem 0;
        padding-left: calc(14px + 0.7rem);
        outline: none;
        transition:
          border-color 0.3s,
          color 0.3s;
      }
      .todo-add::placeholder {
        color: var(--text-dim);
        opacity: 0.5;
      }
      .todo-add:focus {
        border-color: var(--crimson);
        color: var(--text);
      }

      /* Bottom bar */
      .bottom-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 10;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        padding: 1.5rem 2rem;
      }

      .quote {
        max-width: 360px;
        font-family: "Cormorant Garamond", serif;
        font-size: 1.05rem;
        font-style: italic;
        font-weight: 300;
        line-height: 1.5;
        color: var(--text-mid);
        text-shadow:
          0 1px 3px rgba(0, 0, 0, 0.7),
          0 1px 14px rgba(0, 0, 0, 0.5);
        cursor: pointer;
        transition: color 0.3s;
      }
      .quote:hover {
        color: var(--text);
      }
      .quote-attr {
        font-style: normal;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.65rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-top: 0.3rem;
        color: var(--text-mid);
        opacity: 0.85;
      }

      .settings-btn {
        background: none;
        border: 1px solid var(--border);
        color: var(--text-dim);
        font:
          300 0.6rem "JetBrains Mono",
          monospace;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 0.4rem 0.8rem;
        cursor: pointer;
        border-radius: 2px;
        transition: all 0.3s;
      }
      .settings-btn:hover {
        border-color: var(--text-mid);
        color: var(--text);
      }

      /* Settings modal */
      .settings-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 100;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(8px);
      }
      .settings-overlay.open {
        display: flex;
      }

      .settings-panel {
        background: #111114;
        border: 1px solid var(--border);
        padding: 2.5rem;
        width: 90%;
        max-width: 440px;
        border-radius: 3px;
      }

      .settings-title {
        font-family: "Cormorant Garamond", serif;
        font-weight: 300;
        font-size: 1.4rem;
        margin-bottom: 1.8rem;
        color: var(--text);
      }

      .settings-group {
        margin-bottom: 1.4rem;
      }

      .settings-label {
        font-size: 0.6rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--text-dim);
        margin-bottom: 0.4rem;
      }

      .settings-input {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text);
        font:
          300 0.8rem "JetBrains Mono",
          monospace;
        padding: 0.6rem 0.8rem;
        outline: none;
        border-radius: 2px;
        transition: border-color 0.3s;
      }
      .settings-input:focus {
        border-color: var(--crimson);
      }
      .settings-hint {
        font-size: 0.6rem;
        color: var(--text-dim);
        opacity: 0.6;
        margin-top: 0.3rem;
        line-height: 1.5;
      }

      .settings-actions {
        display: flex;
        gap: 0.8rem;
        margin-top: 2rem;
        justify-content: flex-end;
      }

      .btn {
        background: none;
        border: 1px solid var(--border);
        color: var(--text-mid);
        font:
          300 0.65rem "JetBrains Mono",
          monospace;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 0.5rem 1.2rem;
        cursor: pointer;
        border-radius: 2px;
        transition: all 0.3s;
      }
      .btn:hover {
        border-color: var(--text-mid);
        color: var(--text);
      }
      .btn.primary {
        background: var(--crimson);
        border-color: var(--crimson);
        color: #fff;
      }
      .btn.primary:hover {
        background: #a83232;
        border-color: #a83232;
      }

      /* Fade in */
      .content,
      .top-bar,
      .bottom-bar {
        animation: fadeUp 1s ease forwards;
        opacity: 0;
      }
      .top-bar {
        animation-delay: 0.2s;
      }
      .content {
        animation-delay: 0.1s;
      }
      .bottom-bar {
        animation-delay: 0.4s;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-image" id="bgImage"></div>
    <div
      class="bg-overlay"
      id="bgOverlay"
      title="Click for a new background"
    ></div>

    <div class="top-bar">
      <div class="date-display" id="dateDisplay"></div>
      <div class="weather-display" id="weatherDisplay">
        <div class="weather-temp">
          <span class="weather-icon" id="weatherIcon"></span
          ><span id="weatherTemp">--°</span>
        </div>
        <div class="weather-desc" id="weatherDesc">click to set up</div>
        <div class="weather-extra" id="weatherExtra"></div>
      </div>
    </div>

    <div class="content">
      <div class="greeting" id="greeting"></div>
      <div class="clock" id="clock"></div>
      <div class="mantra" id="mantra"></div>

      <div class="todo-section">
        <div class="todo-label">Today</div>
        <ul class="todo-list" id="todoList"></ul>
        <input
          class="todo-add"
          id="todoAdd"
          type="text"
          placeholder="+ add a task"
        />
      </div>
    </div>

    <div class="bottom-bar">
      <div
        class="quote"
        id="quoteDisplay"
        title="Click for a new quote"
      ></div>
      <button class="settings-btn" id="settingsBtn">settings</button>
    </div>

    <div class="settings-overlay" id="settingsOverlay">
      <div class="settings-panel">
        <div class="settings-title">Settings</div>
        <div class="settings-group">
          <div class="settings-label">Your Name</div>
          <input
            class="settings-input"
            id="nameInput"
            type="text"
            placeholder="shown in the greeting (optional)"
          />
        </div>
        <div class="settings-group">
          <div class="settings-label">Clock Format</div>
          <div style="display: flex; gap: 0.5rem; margin-top: 0.3rem">
            <button class="btn fmt-btn" data-fmt="24h">24h</button>
            <button class="btn fmt-btn" data-fmt="12h">12h</button>
            <button class="btn" id="secondsBtn">Seconds: off</button>
          </div>
        </div>
        <div class="settings-group">
          <div class="settings-label">OpenWeatherMap API Key</div>
          <input
            class="settings-input"
            id="apiKeyInput"
            type="text"
            placeholder="paste your API key"
          />
          <div class="settings-hint">
            Free at openweathermap.org/api — takes ~2hrs to activate after
            signup
          </div>
        </div>
        <div class="settings-group">
          <div class="settings-label">Location</div>
          <input
            class="settings-input"
            id="locationInput"
            type="text"
            placeholder="e.g. Salt Lake City"
          />
        </div>
        <div class="settings-group">
          <div class="settings-label">Temperature Unit</div>
          <div style="display: flex; gap: 0.5rem; margin-top: 0.3rem">
            <button class="btn unit-btn" data-unit="imperial">°F</button>
            <button class="btn unit-btn" data-unit="metric">°C</button>
          </div>
        </div>
        <div class="settings-actions">
          <button class="btn" id="cancelBtn">Cancel</button>
          <button class="btn primary" id="saveBtn">Save</button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
